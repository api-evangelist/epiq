  - name: EpiqPay Payment API
    description: EpiqPay is Epiq's proprietary platform facilitating digital settlement payments. Provides APIs for disbursing class action and settlement funds to claimants via diverse payment networks including PayPal, Visa, and Amazon. Used in class action administration and mass tort settlement distribution.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.epiqglobal.com/en-us/technologies/class-action-and-mass-tort-technologies/epiqpay
