  - name: Epiq eDiscovery API
    description: Epiq Discover provides an open API and third-party integration support for eDiscovery workflows, enabling seamless adoption within client tech stacks. Supports preserving, processing, analyzing, reviewing, and producing data across litigation, investigations, and regulatory requests.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.epiqglobal.com/en-us/technologies/legal-solutions/epiq-discover
