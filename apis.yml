apis:
  - name: Epiq AACER Bankruptcy API
    description: The AACER API enables real-time bankruptcy case information to be electronically transmitted system-to-system, integrating with the industry's largest servicing applications and proprietary systems. Supports case coversheet retrieval, portfolio monitoring, and loan notification management.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
