        url: https://www.epiqglobal.com/en-us/contact-us

  - name: EpiqFiling Claims API
    description: EpiqFiling manages securities class action claims in one secure portal, providing APIs to file, track, and review claims. Enables automated claims submission, status tracking, and reporting for securities settlement administration.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
